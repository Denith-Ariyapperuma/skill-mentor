spring.application.name=skillmentor

# Server (Render sets PORT)
server.port=${PORT:8081}

# Database — set via environment (Spring Boot relaxed binding also accepts SPRING_DATASOURCE_*)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/skillmentor}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}

# Logging
logging.level.root=${LOG_LEVEL_ROOT:INFO}

# Clerk JWT — verify tokens against your instance JWKS (override with CLERK_JWKS_URL in production)
clerk.jwks.url=${CLERK_JWKS_URL:https://sensible-boa-35.clerk.accounts.dev/.well-known/jwks.json}

# CORS — comma-separated origins (your Vercel URL + local dev)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:3001,http://localhost:8081,http://127.0.0.1:5173,http://127.0.0.1:3001}
