# Additional DB Configurations
# ===
spring.jpa.hibernate.ddl-auto=update
logging.level.root=ERROR

# Authentication Configuration (Clerk)
# ===
auth.validator.type=clerk

# Prod (empty default avoids startup failure when env is missing; Clerk still requires a real URL)
clerk.jwks.url=${CLERK_JWKS_URL:}

# CORS set to your Vercel frontend URL on Render once deployed
# e.g. CORS_ALLOWED_ORIGINS=https://your-app.vercel.app,http://localhost:3001
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost:8080}
