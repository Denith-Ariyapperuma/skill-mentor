services:
  db:
    image: postgres:15-alpine
    container_name: skill-mentor-db
    environment:
      POSTGRES_DB: skill_mentor_v2
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    image: skill-mentor-service:lts
    container_name: skill-mentor-backend
    ports:
      - "8085:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/skill_mentor_v2
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
      - CLERK_JWKS_URL=${CLERK_JWKS_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173}
    depends_on:
      - db

volumes:
  postgres_data:
